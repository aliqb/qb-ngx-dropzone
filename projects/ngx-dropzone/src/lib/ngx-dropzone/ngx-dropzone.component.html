<input #fileInput type="file" [id]="id()" [multiple]="multiple" [accept]="accept()" [disabled]="disabledInput()"
  (change)="_onFilesSelected($event)" [attr.aria-label]="ariaLabel()" [attr.aria-labelledby]="ariaLabelledby()"
  [attr.aria-describedby]="ariaDescribedBy()">
  @if (!_hasPreviews) {
    <ng-content select="qb-ngx-dropzone-label"></ng-content>
  }
  <ng-content select="qb-ngx-dropzone-preview"></ng-content>
  <ng-content></ng-content>
